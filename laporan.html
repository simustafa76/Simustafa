<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Laporan - SI-MUSTAFA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-left">
            <div class="header-logo">
                <img src="assets/logo-kemenag.png" alt="Logo" 
                     onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Cpolygon points=%2250,5 61,35 93,35 68,53 79,83 50,65 21,83 32,53 7,35 39,35%22 fill=%22%23FFD700%22 stroke=%22%23DAA520%22 stroke-width=%222%22/%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2225%22 fill=%22none%22 stroke=%22%23FFFFFF%22 stroke-width=%223%22/%3E%3Ctext x=%2250%22 y=%2256%22 text-anchor=%22middle%22 font-size=%2220%22 font-weight=%22bold%22 fill=%22%23FFFFFF%22 font-family=%22Arial%22%3E%EF%B7%B2%3C/text%3E%3C/svg%3E'">
                <div>
                    <h1>SI-<span>MUSTAFA</span></h1>
                    <small>Kemenag Kab. Tegal</small>
                </div>
            </div>
        </div>
        <div class="header-right">
            <span class="header-date" id="currentDate"></span>
            <div class="header-user" onclick="showToast('Profile', 'info')">
                <div class="avatar" id="userAvatar">A</div>
                <span class="user-name" id="userName">Admin</span>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">

        <div class="page-header">
            <h1>Laporan</h1>
            <p>Generate dan export laporan data pendidik keagamaan</p>
        </div>

        <!-- ===== FILTER ===== -->
        <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;background:white;padding:16px;border-radius:12px;box-shadow:var(--card-shadow);">
            <div style="flex:1;min-width:120px;">
                <label style="font-size:0.7rem;color:#888;display:block;margin-bottom:2px;">Kecamatan</label>
                <select id="filterKecamatan" style="width:100%;padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.85rem;background:white;">
                    <option value="all">Semua Kecamatan</option>
                </select>
            </div>
            <div style="flex:1;min-width:120px;">
                <label style="font-size:0.7rem;color:#888;display:block;margin-bottom:2px;">Jenis Lembaga</label>
                <select id="filterJenis" style="width:100%;padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.85rem;background:white;">
                    <option value="all">Semua Jenis</option>
                    <option value="LPQ">LPQ</option>
                    <option value="MDT">MDT</option>
                    <option value="PONPES">Pondok Pesantren</option>
                </select>
            </div>
            <div style="flex:1;min-width:100px;">
                <label style="font-size:0.7rem;color:#888;display:block;margin-bottom:2px;">Status</label>
                <select id="filterStatus" style="width:100%;padding:8px 12px;border:2px solid #e0e0e0;border-radius:8px;font-size:0.85rem;background:white;">
                    <option value="all">Semua Status</option>
                    <option value="active">Aktif</option>
                    <option value="inactive">Tidak Aktif</option>
                </select>
            </div>
            <div style="display:flex;align-items:flex-end;gap:8px;">
                <button class="btn btn-primary" onclick="generateReport()"><i class="fas fa-file-alt"></i> Generate</button>
                <button class="btn btn-success" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Export Excel</button>
                <button class="btn btn-outline" onclick="exportPDF()"><i class="fas fa-file-pdf"></i> Export PDF</button>
            </div>
        </div>

        <!-- ===== RESULT ===== -->
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;">
                <div class="card-title" style="margin-bottom:0;">Hasil Laporan <small id="totalData" style="font-weight:400;color:#888;">0 data</small></div>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-outline" onclick="refreshData()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>NIK</th>
                            <th>Nama Pendidik</th>
                            <th>Lembaga</th>
                            <th>Kecamatan</th>
                            <th>Status</th>
                            <th>Lama Mengabdi</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                        <tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">
                            <i class="fas fa-file-alt" style="font-size:24px;display:block;margin-bottom:8px;"></i>
                            Pilih filter dan klik Generate untuk melihat laporan
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- ===== BOTTOM NAVIGATION ===== -->
    <nav class="bottom-nav">
        <a class="nav-item" href="dashboard.html">
            <i class="fas fa-chart-pie"></i>
            <span>Dashboard</span>
        </a>
        <a class="nav-item" href="lembaga.html">
            <i class="fas fa-building"></i>
            <span>Lembaga</span>
        </a>
        <a class="nav-item" href="pendidik.html">
            <i class="fas fa-user-graduate"></i>
            <span>Pendidik</span>
            <span class="nav-badge" id="navPendidikCount">0</span>
        </a>
        <a class="nav-item" href="bantuan.html">
            <i class="fas fa-hand-holding-heart"></i>
            <span>Bantuan</span>
        </a>
        <a class="nav-item active" href="laporan.html">
            <i class="fas fa-file-alt"></i>
            <span>Laporan</span>
        </a>
    </nav>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // ============================================================
        // ===== LAPORAN SPECIFIC =====
        // ============================================================
        let reportData = [];

        // Load kecamatan filter
        async function loadKecamatanFilter() {
            try {
                const { data } = await supabaseClient
                    .from('master_kecamatan')
                    .select('nama')
                    .order('nama');

                const select = document.getElementById('filterKecamatan');
                (data || []).forEach(item => {
                    select.innerHTML += `<option value="${item.nama}">${item.nama}</option>`;
                });
            } catch (e) { console.error(e); }
        }

        // Generate report
        async function generateReport() {
            const kecamatan = document.getElementById('filterKecamatan').value;
            const jenis = document.getElementById('filterJenis').value;
            const status = document.getElementById('filterStatus').value;

            showToast('Mengenerate laporan...', 'info');

            try {
                let query = supabaseClient
                    .from('pendidik')
                    .select('*, lembaga(nama, jenis_lembaga)');

                // Filters
                if (kecamatan !== 'all') {
                    query = query.eq('kecamatan_lembaga', kecamatan);
                }
                if (jenis !== 'all') {
                    query = query.eq('jenis_lembaga', jenis);
                }
                if (status === 'active') {
                    query = query.eq('status_aktif', true);
                } else if (status === 'inactive') {
                    query = query.eq('status_aktif', false);
                }

                const { data, error } = await query.order('nama_lengkap');

                if (error) throw error;

                reportData = data || [];
                document.getElementById('totalData').textContent = `${reportData.length} data`;

                const tbody = document.getElementById('reportTableBody');
                if (reportData.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:#999;">
                        <i class="fas fa-search" style="font-size:24px;display:block;margin-bottom:8px;"></i>
                        Tidak ada data sesuai filter
                    </td></tr>`;
                    return;
                }

                tbody.innerHTML = reportData.map((item, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td><code style="background:#f0f2f5;padding:2px 6px;border-radius:4px;font-size:0.7rem;">${item.nik || '-'}</code></td>
                        <td><strong>${item.nama_lengkap || '-'}</strong></td>
                        <td>${item.lembaga?.nama || item.nslp_lembaga || '-'}</td>
                        <td>${item.kecamatan_lembaga || '-'}</td>
                        <td><span class="badge ${item.status_aktif ? 'active' : 'inactive'}">${item.status_aktif ? 'Aktif' : 'Tidak Aktif'}</span></td>
                        <td>${item.lama_mengabdi || 0} tahun</td>
                    </tr>
                `).join('');

                showToast(`Laporan berhasil digenerate: ${reportData.length} data`, 'success');

            } catch (e) {
                console.error(e);
                showToast('Gagal generate laporan: ' + e.message, 'error');
            }
        }

        // Export Excel
        function exportExcel() {
            if (!reportData || reportData.length === 0) {
                showToast('Tidak ada data untuk diexport', 'warning');
                return;
            }

            try {
                // Buat data untuk Excel
                const excelData = reportData.map((item, i) => ({
                    'No': i + 1,
                    'NIK': item.nik || '',
                    'Nama Lengkap': item.nama_lengkap || '',
                    'Lembaga': item.lembaga?.nama || item.nslp_lembaga || '',
                    'Kecamatan': item.kecamatan_lembaga || '',
                    'Status': item.status_aktif ? 'Aktif' : 'Tidak Aktif',
                    'Lama Mengabdi': (item.lama_mengabdi || 0) + ' tahun'
                }));

                // Buat CSV
                const headers = Object.keys(excelData[0]);
                const csvRows = [];
                csvRows.push(headers.join(','));
                for (const row of excelData) {
                    const values = headers.map(header => {
                        const val = row[header] || '';
                        return `"${String(val).replace(/"/g, '""')}"`;
                    });
                    csvRows.push(values.join(','));
                }

                const csv = csvRows.join('\n');
                const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `laporan_pendidik_${new Date().toISOString().split('T')[0]}.csv`;
                link.click();
                URL.revokeObjectURL(link.href);

                showToast('Export Excel berhasil!', 'success');
            } catch (e) {
                console.error(e);
                showToast('Gagal export: ' + e.message, 'error');
            }
        }

        // Export PDF (simulasi)
        function exportPDF() {
            if (!reportData || reportData.length === 0) {
                showToast('Tidak ada data untuk diexport', 'warning');
                return;
            }
            showToast('Fitur PDF akan segera tersedia', 'info');
        }

        // Refresh
        function refreshData() {
            generateReport();
            supabaseClient.from('pendidik').select('*', { count: 'exact', head: true }).eq('status_aktif', true)
                .then(({ count }) => { document.getElementById('navPendidikCount').textContent = count || 0; });
        }

        // Init
        document.addEventListener('DOMContentLoaded', async function() {
            await checkAuth();
            updateDate();
            await loadKecamatanFilter();

            // Update pendidik badge
            const { count } = await supabaseClient
                .from('pendidik')
                .select('*', { count: 'exact', head: true })
                .eq('status_aktif', true);
            document.getElementById('navPendidikCount').textContent = count || 0;

            setInterval(updateDate, 60000);
        });

        window.generateReport = generateReport;
        window.exportExcel = exportExcel;
        window.exportPDF = exportPDF;
        window.refreshData = refreshData;
    </script>
</body>
</html>
