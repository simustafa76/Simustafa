<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SI-MUSTAFA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #006400;
            --primary-dark: #004d00;
            --text-dark: #1a2a3a;
            --text-gray: #666;
        }

        body {
            min-height: 100vh;
            display: flex;
            background: #f0f4f0;
        }

        /* ===== LEFT PANEL - GAMBAR ===== */
        .brand-panel {
            flex: 1.2;
            background: url('assets/login.png') no-repeat center center / cover;
            min-height: 100vh;
            position: relative;
            /* Jika gambar tidak ditemukan, fallback warna hijau */
            background-color: #006400;
        }

        /* Opsional overlay gelap tipis jika gambar kurang kontras */
        .brand-panel::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.05);
            z-index: 0;
        }

        /* ===== RIGHT PANEL - LOGIN ===== */
        .login-panel {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            min-height: 100vh;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .login-box .login-header {
            margin-bottom: 30px;
        }

        .login-box .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .login-box .login-header h1 span {
            color: #DAA520;
        }

        .login-box .login-header p {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .login-box .login-hint {
            background: #e8f5e9;
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }

        .login-box .login-hint i {
            margin-right: 6px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #333;
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: 0.3s;
            background: #fafafa;
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 100, 0, 0.08);
        }

        .form-group input.error {
            border-color: #f44336;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 22px;
            font-size: 0.85rem;
            flex-wrap: wrap;
            gap: 6px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #555;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .form-options a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .form-options a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 100, 0, 0.25);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #ffebee;
            color: #f44336;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            border-left: 4px solid #f44336;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #4CAF50;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            border-left: 4px solid #4CAF50;
            display: none;
        }

        .loader {
            width: 22px;
            height: 22px;
            border: 3px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .input-hint {
            font-size: 0.7rem;
            color: #888;
            margin-top: 4px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .brand-panel {
                min-height: 200px;
                height: 200px;
                flex: none;
                width: 100%;
                background-size: cover;
                background-position: center;
            }
            .login-panel {
                min-height: auto;
                padding: 24px;
            }
            .login-box {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .login-panel {
                padding: 16px;
            }
            .login-box .login-header h1 {
                font-size: 1.4rem;
            }
        }

        @media (min-width: 769px) {
            .brand-panel {
                /* Gambar akan tampil full di desktop */
            }
        }
    </style>
</head>
<body>

    <!-- ===== LEFT PANEL - GAMBAR ===== -->
    <div class="brand-panel"></div>

    <!-- ===== RIGHT PANEL - LOGIN ===== -->
    <div class="login-panel">
        <div class="login-box">

            <div class="login-header">
                <h1>Selamat Datang</h1>
                <p>Masuk ke SI-MUSTAFA untuk melanjutkan</p>
            </div>

            <div class="login-hint">
                <i class="fas fa-info-circle"></i> Masuk dengan <strong>NIK</strong> (16 digit) atau <strong>Email</strong>.
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="identifier">NIK / Email</label>
                    <input type="text" id="identifier" placeholder="3328012010810001 atau admin@simustafa.com" required>
                    <div class="input-hint" id="inputHint">💡 Contoh: 3328012010810001 (NIK) atau admin@simustafa.com</div>
                </div>

                <div class="form-group">
                    <label for="password">Kata Sandi</label>
                    <input type="password" id="password" placeholder="Masukkan kata sandi" required>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe"> Ingat saya
                    </label>
                    <a href="#" onclick="alert('Hubungi admin untuk reset password')">Lupa password?</a>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="btnText">Masuk</span>
                    <span id="btnLoader" class="loader" style="display:none;"></span>
                </button>
            </form>

            <div style="text-align:center;margin-top:20px;font-size:0.75rem;color:#aaa;">
                © 2026 SI-MUSTAFA – Kemenag Kab. Tegal
            </div>
        </div>
    </div>

    <script src="js/supabase-client.js"></script>
    <script>
        // ============================================================
        // ===== KONFIGURASI =====
        // ============================================================
        const DOMAIN_EMAIL = '@simustafa.local';
        const DEFAULT_PASSWORD = 'nik123456';

        const form = document.getElementById('loginForm');
        const identifier = document.getElementById('identifier');
        const password = document.getElementById('password');
        const btn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnLoader = document.getElementById('btnLoader');
        const errorMsg = document.getElementById('errorMessage');
        const successMsg = document.getElementById('successMessage');
        const rememberMe = document.getElementById('rememberMe');
        const inputHint = document.getElementById('inputHint');

        // ============================================================
        // ===== FUNGSI KONVERSI =====
        // ============================================================
        function isNIK(value) {
            return /^\d{16}$/.test(value.replace(/\s/g, ''));
        }

        function nikToEmail(nik) {
            return `nik_${nik.replace(/\s/g, '')}${DOMAIN_EMAIL}`;
        }

        function detectIdentifier(value) {
            const clean = value.trim();
            if (!clean) return { type: 'empty' };
            if (clean.includes('@')) return { type: 'email', value: clean };
            if (isNIK(clean)) return { type: 'nik', value: clean, email: nikToEmail(clean) };
            return { type: 'unknown', value: clean };
        }

        // ============================================================
        // ===== LIVE HINT =====
        // ============================================================
        identifier.addEventListener('input', function() {
            const raw = this.value.trim();
            if (!raw) {
                inputHint.innerHTML = '💡 Contoh: 3328012010810001 (NIK) atau admin@simustafa.com';
                return;
            }
            const detection = detectIdentifier(raw);
            if (detection.type === 'nik') {
                inputHint.innerHTML = `🔑 Login sebagai NIK: <strong>${detection.value}</strong> → ${detection.email}`;
            } else if (detection.type === 'email') {
                inputHint.innerHTML = `📧 Login sebagai Email: <strong>${detection.value}</strong>`;
            } else {
                inputHint.innerHTML = '⚠️ Masukkan NIK 16 digit atau Email yang valid.';
            }
        });

        // ============================================================
        // ===== LOGIN =====
        // ============================================================
        async function handleLogin(e) {
            e.preventDefault();

            errorMsg.style.display = 'none';
            errorMsg.textContent = '';
            successMsg.style.display = 'none';
            successMsg.textContent = '';
            identifier.classList.remove('error');
            password.classList.remove('error');

            const rawInput = identifier.value.trim();
            const pass = password.value.trim();

            if (!rawInput || !pass) {
                showError('NIK/Email dan kata sandi harus diisi!');
                return;
            }

            const detection = detectIdentifier(rawInput);
            if (detection.type === 'empty' || detection.type === 'unknown') {
                showError('Masukkan NIK 16 digit atau Email yang valid.');
                identifier.classList.add('error');
                return;
            }

            let loginEmail = detection.type === 'nik' ? detection.email : detection.value;

            setLoading(true);

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: loginEmail,
                    password: pass
                });

                if (error) {
                    // Coba dengan password default jika NIK
                    if (detection.type === 'nik' && error.message.includes('Invalid login credentials')) {
                        const retry = await supabaseClient.auth.signInWithPassword({
                            email: loginEmail,
                            password: DEFAULT_PASSWORD
                        });
                        if (retry.error) {
                            throw new Error('NIK atau password salah. Jika pertama kali, gunakan password default: ' + DEFAULT_PASSWORD);
                        }
                        // Berhasil dengan default password
                        showSuccess('Login berhasil! (password default). Segera ganti password Anda.');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                        return;
                    }
                    throw error;
                }

                // Login sukses
                if (rememberMe.checked) {
                    localStorage.setItem('rememberIdentifier', rawInput);
                } else {
                    localStorage.removeItem('rememberIdentifier');
                }

                // Ambil role untuk redirect
                const { data: userData } = await supabaseClient
                    .from('users')
                    .select('role')
                    .eq('id', data.user.id)
                    .single();

                const role = userData?.role || 'viewer';
                let redirectUrl = 'dashboard.html';
                if (role === 'pendidik') redirectUrl = 'profile-pendidik.html';
                else if (role === 'operator') redirectUrl = 'lembaga.html';

                showSuccess('Login berhasil! Mengalihkan...');
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showError(error.message || 'Login gagal. Periksa NIK/Email dan password.');
                identifier.classList.add('error');
                password.classList.add('error');
            } finally {
                setLoading(false);
            }
        }

        // ============================================================
        // ===== UTILITY =====
        // ============================================================
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(msg) {
            successMsg.textContent = msg;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function setLoading(loading) {
            btn.disabled = loading;
            btnText.style.display = loading ? 'none' : 'inline';
            btnLoader.style.display = loading ? 'inline-block' : 'none';
        }

        // ============================================================
        // ===== CHECK SESSION =====
        // ============================================================
        async function checkSession() {
            try {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    const { data: userData } = await supabaseClient
                        .from('users')
                        .select('role')
                        .eq('id', session.user.id)
                        .single();
                    const role = userData?.role || 'viewer';
                    const redirectUrl = role === 'pendidik' ? 'profile-pendidik.html' : 'dashboard.html';
                    window.location.href = redirectUrl;
                    return;
                }
                const saved = localStorage.getItem('rememberIdentifier');
                if (saved) {
                    identifier.value = saved;
                    rememberMe.checked = true;
                    // Trigger hint update
                    identifier.dispatchEvent(new Event('input'));
                }
            } catch (e) { console.error(e); }
        }

        // ============================================================
        // ===== INIT =====
        // ============================================================
        form.addEventListener('submit', handleLogin);
        document.addEventListener('DOMContentLoaded', checkSession);

        password.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
